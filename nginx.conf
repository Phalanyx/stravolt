user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

# ──────────────────────────────────────────────────────────────────────────────
# STREAM — SNI-based routing on port 443
#
# Reads the TLS ClientHello SNI before any SSL handshake so we can:
#   • pass telemetry.stravolt.com straight through to fleet-telemetry (mTLS)
#   • forward everything else to the HTTP block below (Rails, port 8443)
# ──────────────────────────────────────────────────────────────────────────────
stream {
    log_format stream '$remote_addr [$time_local] $protocol '
                      '$bytes_sent $bytes_received $session_time '
                      '"$ssl_preread_server_name"';
    access_log /var/log/nginx/stream_access.log stream;

    map $ssl_preread_server_name $backend {
        telemetry.stravolt.com  127.0.0.1:4443;   # fleet-telemetry (own TLS/mTLS)
        default                 127.0.0.1:8443;   # nginx HTTP block → Rails
    }

    server {
        listen 443;
        proxy_pass    $backend;
        ssl_preread   on;

        proxy_connect_timeout 10s;
        proxy_timeout         600s;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# HTTP — stravolt.com (Rails)
# ──────────────────────────────────────────────────────────────────────────────
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    gzip on;

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name stravolt.com www.stravolt.com;
        return 301 https://$host$request_uri;
    }

    # ── stravolt.com (SSL termination → Rails on 3000) ──────────────────────
    #
    # Listens on 8443 (internal); the stream block above forwards 443 here.
    # Update ssl_certificate paths to wherever your Let's Encrypt certs live.
    server {
        listen 8443 ssl;
        server_name stravolt.com www.stravolt.com;

        ssl_certificate     /etc/letsencrypt/live/stravolt.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/stravolt.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;

        # Rails proxy
        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Keep ActionCable / Turbo Streams alive
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 60s;
        }
    }
}
